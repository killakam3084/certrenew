services:
  certrenew:
    image: ghcr.io/killakam3084/certrenew:latest
    container_name: certrenew
    env_file: /mnt/cell_block_d/apps/certrenew/.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/cell_block_d/apps/certrenew/config.json:/etc/certrenew/config.json:ro
    restart: "no"
